<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="worker-src 'self'; media-src *" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>startSilent Test</title>
    <link rel="stylesheet" href="../recording/recording.css" />
    <style>
      .status-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem 1rem;
      }
      .status-grid div {
        background: var(--bg-alt);
        border: 1px solid var(--surface);
        border-radius: 6px;
        padding: 0.5rem 0.75rem;
      }
      #hiddenAudioContainer {
        display: none;
      }
      #testMode,
      #testDescription {
        white-space: pre-wrap;
      }
      .probe-meter {
        max-width: 30rem;
        background-color: var(--bg-alt);
        border: 1px solid var(--surface);
        border-radius: 6px;
        padding: 0.6rem 0.75rem;
        margin-top: 1rem;
      }
    </style>
    <script>
      window.chromeTestConfig = {
        slug: 'start_silent_probe',
        name: 'startSilent test',
        description:
          'Retests the claim that startSilent=true prevents the bot from receiving room audio. This otherwise follows the raw-stream path, but never saves data.',
        attachAudioElements: false,
        analyzeOriginalStream: true,
        connectOriginalStreamToMix: true,
        analyzeAudioElement: false,
        connectAudioElementToMix: false,
        mirrorAudioElementToDestination: false,
        enableMediaRecorderProbe: true,
        exposeOutputRouting: false,
        probeChunkIntervalMs: 5000,
        startSilent: true,
      }
    </script>
  </head>
  <body>
    <div class="wrapper">
      <section id="logOuter">
        <label for="targetJitsi">Conference URL: </label>
        <input style="width: 35vw" type="url" id="targetJitsi" />
        <br />
        <br />
        <button id="start_bot_button">Load Bot</button>
        <button id="start_recording_button" disabled>Start Test</button>
        <button id="stop_bot_button">Stop Test</button>
        <br />
        <br />
        <a href="index.html"><button type="button">Back to Suite</button></a>
      </section>
      <aside id="participantsOuter">
        <div class="infobox">
          <div class="left-side">
            <h1 id="testName">Chrome Test</h1>
            <div id="testDescription"></div>
          </div>
          <div class="right-side">
            <img width="100%" src="../images/switchboard_icon.png" title="Recording Test" />
          </div>
        </div>
      </aside>
    </div>

    <div class="wrapper">
      <section id="logOuter">
        <h3>Status</h3>
        <div class="status-grid">
          <div><strong>Test Slug:</strong> <span id="testSlug"></span></div>
          <div><strong>Connection:</strong> <span id="connectionStatus"></span></div>
          <div><strong>Test:</strong> <span id="probeStatus"></span></div>
          <div><strong>Recorder:</strong> <span id="recorderStatus"></span></div>
          <div><strong>Output API:</strong> <span id="sinkSupportStatus"></span></div>
          <div><strong>Selected Sink:</strong> <span id="selectedSinkStatus"></span></div>
          <div><strong>Raw Source:</strong> <span id="rawStatus"></span></div>
          <div><strong>Element Source:</strong> <span id="elementStatus"></span></div>
          <div><strong>Mix:</strong> <span id="mixStatus"></span></div>
          <div><strong>Recorder Chunks:</strong> <span id="chunkStatus"></span></div>
        </div>
        <br />
        <strong>Config:</strong>
        <div id="testMode"></div>
      </section>
      <aside id="participantsOuter">
        <h3>Participants</h3>
        <div id="participantsInner"></div>
        <br />
        <h3>Track Diagnostics</h3>
        <div id="trackDiagnostics"></div>
      </aside>
    </div>

    <section class="probe-meter" aria-live="polite">
      <div class="meter-header">
        <strong>Original Stream Level</strong>
        <span id="rawLevelValue">0%</span>
      </div>
      <div id="recordingLevelTrack" role="meter" aria-label="Original stream level">
        <div id="rawLevelBar"></div>
      </div>
    </section>

    <section class="probe-meter" aria-live="polite" hidden id="elementMeterOuter">
      <div class="meter-header">
        <strong>Audio Element Level</strong>
        <span id="elementLevelValue">0%</span>
      </div>
      <div id="recordingLevelTrack" role="meter" aria-label="Audio element level">
        <div id="elementLevelBar"></div>
      </div>
    </section>

    <section class="probe-meter" aria-live="polite" id="mixMeterOuter">
      <div class="meter-header">
        <strong>Mix / Recorder Input Level</strong>
        <span id="mixLevelValue">0%</span>
      </div>
      <div id="recordingLevelTrack" role="meter" aria-label="Mix level">
        <div id="mixLevelBar"></div>
      </div>
    </section>

    <div class="wrapper">
      <section id="logOuter">
        <h3>Test Log</h3>
        <button id="clearLog">Clear Log</button>
        <div id="log" style="white-space: pre-wrap"></div>
      </section>
      <aside id="participantsOuter">
        <h3>Hidden Audio Elements</h3>
        <div id="hiddenAudioContainer"></div>
      </aside>
    </div>

    <script id="libJitsiMeet"></script>
    <script id="jitsiConfig"></script>
    <script src="../jitsi-bot/defaults.js"></script>
    <script src="test_harness.js"></script>
    <script src="../jitsi-bot/pageParams.js"></script>
    <script id="confInit"></script>
  </body>
</html>
